---
name: Deploy CDK Stack
description: Install AWS CDK, the project dependencies and deploy the CDK stack.

inputs:
  role_to_assume:
    description: Role ARN to be assumed
    required: true

  aws_region:
    description: AWS region to deploy
    required: true

  stack_name:
    description: Name of the stack to deploy
    required: true

  machine_user_pat:
    description: Github Catena Machine User Personal Access Token (PAT)
    required: true

  cdk_version:
    description: AWS CDK version
    required: false
    default: latest

  docker_driver:
    description: Docker driver to use on buildx
    required: false
    default: docker-container

  directory:
    description: Directory to set up the Python environment and deploy the CDK app.
    required: false
    default: .

  exclusively:
    description: Deploy only the specified stack, without its dependencies.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set Up Environment and load Cached Dependencies
      uses: catenaclearing/catena-actions/composite/setup-python@v0
      with:
        machine_user_pat: ${{ inputs.machine_user_pat }}
        directory: ${{ inputs.directory }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver: ${{ inputs.docker_driver }}
        buildkitd-flags: --debug

    - name: Expose GitHub Runtime (for gha cache)
      uses: crazy-max/ghaction-github-runtime@v4

    - name: Cache CDK
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: npm-cdk-${{ runner.os }}-${{ inputs.cdk_version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.role_to_assume }}
        role-session-name: ${{ github.event.repository.name }}-${{ github.actor }}
        aws-region: ${{ inputs.aws_region }}

    - name: Guard against stack-name collision
      shell: bash
      run: |
        set -euo pipefail
        OWNER_TAG="cost:repo"
        THIS_REPO="${GITHUB_REPOSITORY##*/}"
        if STACK_JSON=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --output json 2>/dev/null); then
          OWNER=$(echo "$STACK_JSON" | jq -r --arg k "$OWNER_TAG" 'first(.Stacks[0].Tags[]? | select(.Key == $k) | .Value) // ""')
          if [ -n "$OWNER" ] && [ "$OWNER" != "$THIS_REPO" ]; then
            echo "::error::Stack '$STACK_NAME' already exists and is owned by repo '$OWNER' (tag $OWNER_TAG). Refusing to deploy from '$THIS_REPO' — this would overwrite another service's stack. Choose a unique stack name in app.py and deploy.yaml."
            exit 1
          fi
          if [ -z "$OWNER" ]; then
            echo "::warning::Stack '$STACK_NAME' exists but has no '$OWNER_TAG' tag, so ownership can't be verified. Proceeding."
          else
            echo "Stack '$STACK_NAME' is owned by '$OWNER' (this repo). Safe to update."
          fi
        else
          echo "Stack '$STACK_NAME' does not exist yet. Safe to create."
        fi
      env:
        STACK_NAME: ${{ inputs.stack_name }}
        GITHUB_REPOSITORY: ${{ github.repository }}

    - name: CDK Deploy
      shell: bash
      run: |
        cd "$DIRECTORY"
        source .venv/bin/activate
        EXCLUSIVELY=""
        if [ "$EXCLUSIVELY_FLAG" = "true" ]; then
          EXCLUSIVELY="--exclusively"
        fi
        npx -y "aws-cdk@$CDK_VERSION" deploy "$STACK_NAME" \
          --force $EXCLUSIVELY
      env:
        GITHUB_TOKEN: ${{ inputs.machine_user_pat }}
        DOCKER_BUILDKIT: 1
        BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        DIRECTORY: ${{ inputs.directory }}
        CDK_VERSION: ${{ inputs.cdk_version }}
        STACK_NAME: ${{ inputs.stack_name }}
        EXCLUSIVELY_FLAG: ${{ inputs.exclusively }}
